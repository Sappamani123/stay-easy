<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StayEasy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="navbar">
            <div class="logo">StayEasy</div>
            <nav>
                <a href="#">Home</a>
                <a href="#">Hotels</a>
                <a href="#">Offers</a>
                <a href="#">Contact</a>
            </nav>
            <button class="login">Login</button>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Find Your Perfect Stay</h1>
            <p>Search hotels, resorts & homes</p>

            <div class="Search">
                <label for="Location">Location:</label>
                <select name="Location" id="Location" required>
                    <option value="" disabled selected>
                        -- Select Location --
                    </option>
                    <option value="Hyderabad">Hyderabad</option>
                    <option value="Benguluru">Bengaluru</option>
                    <option value="Chennai">Chennai</option>
                    <option value="Vizag">Vizag</option>
                </select>
                <label for="Start">From:</label>
                <input type="date" id="Start">
                <label for="End">To:</label>
                <input type="date" id="End">
                <button>Search</button>
            </div>
        </div>
    </section>

    <section class="hotels">

        <div class="card">
            <img src="beach.jpg">
            <h3>Sea View Resort</h3>
            <p>Goa, India</p>
            <h4>₹3,500 / night</h4>
            <button>Book Now</button>
        </div>

        <div class="card">
            <img src="mountainstay.jpg">
            <h3>Mountain Escape</h3>
            <p>Manali, India</p>
            <h4>₹4,200 / night</h4>
            <button>Book Now</button>
        </div>

        <div class="card">
            <img src="Luxuryhotel.avif">
            <h3>Luxury Hotel</h3>
            <p>Mumbai, India</p>
            <h4>₹6,000 / night</h4>
            <button>Book Now</button>
        </div>

    </section>

    <footer>
        <p>© 2026 StayEasy Hotels</p>
    </footer>

</body>
</html>
